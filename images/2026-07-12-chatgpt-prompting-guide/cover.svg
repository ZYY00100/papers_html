<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="30%" cy="55%" r="80%">
      <stop offset="0%" stop-color="#3a2c14"/>
      <stop offset="55%" stop-color="#1a1614"/>
      <stop offset="100%" stop-color="#0e0e10"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#c9a962" opacity="0.18"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#dots)"/>

  <!-- Decorative thin lines (top-left and bottom-right) -->
  <line x1="60" y1="60" x2="240" y2="60" stroke="#c9a962" stroke-width="1" opacity="0.6"/>
  <line x1="60" y1="60" x2="60" y2="180" stroke="#c9a962" stroke-width="1" opacity="0.6"/>
  <line x1="1540" y1="840" x2="1360" y2="840" stroke="#c9a962" stroke-width="1" opacity="0.6"/>
  <line x1="1540" y1="840" x2="1540" y2="720" stroke="#c9a962" stroke-width="1" opacity="0.6"/>

  <!-- Brand line -->
  <text x="80" y="135" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="500" letter-spacing="6" fill="#c9a962">OPENAI  ·  OFFICIAL GUIDE</text>

  <!-- Main title -->
  <text x="80" y="260" font-family="'Helvetica Neue', Arial, sans-serif" font-size="118" font-weight="800" letter-spacing="-2" fill="#f5f5f7">PROMPTING</text>
  <text x="80" y="380" font-family="'Helvetica Neue', Arial, sans-serif" font-size="118" font-weight="800" letter-spacing="-2" fill="#f5f5f7">GUIDE</text>

  <!-- Red accent line -->
  <rect x="80" y="410" width="160" height="4" fill="#C8161D"/>

  <!-- Subtitle: four elements -->
  <text x="80" y="455" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="400" letter-spacing="3" fill="#b4b4b8">GOAL · CONTEXT · OUTPUT · BOUNDARIES</text>

  <!-- Four element blocks (right side) -->
  <g transform="translate(1080, 130)">
    <!-- BLOCK 1: GOAL -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="220" height="130" fill="none" stroke="#c9a962" stroke-width="2" opacity="0.85"/>
      <rect x="8" y="8" width="204" height="114" fill="none" stroke="#c9a962" stroke-width="1" opacity="0.3"/>
      <text x="14" y="28" font-family="'Courier New', monospace" font-size="14" fill="#c9a962" opacity="0.7">01</text>
      <text x="110" y="78" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" letter-spacing="3" fill="#f5f5f7" text-anchor="middle">GOAL</text>
    </g>
    <!-- BLOCK 2: CONTEXT -->
    <g transform="translate(240, 0)">
      <rect x="0" y="0" width="220" height="130" fill="none" stroke="#c9a962" stroke-width="2" opacity="0.85"/>
      <rect x="8" y="8" width="204" height="114" fill="none" stroke="#c9a962" stroke-width="1" opacity="0.3"/>
      <text x="14" y="28" font-family="'Courier New', monospace" font-size="14" fill="#c9a962" opacity="0.7">02</text>
      <text x="110" y="78" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" letter-spacing="2" fill="#f5f5f7" text-anchor="middle">CONTEXT</text>
    </g>
    <!-- BLOCK 3: OUTPUT -->
    <g transform="translate(0, 150)">
      <rect x="0" y="0" width="220" height="130" fill="none" stroke="#c9a962" stroke-width="2" opacity="0.85"/>
      <rect x="8" y="8" width="204" height="114" fill="none" stroke="#c9a962" stroke-width="1" opacity="0.3"/>
      <text x="14" y="28" font-family="'Courier New', monospace" font-size="14" fill="#c9a962" opacity="0.7">03</text>
      <text x="110" y="78" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" letter-spacing="3" fill="#f5f5f7" text-anchor="middle">OUTPUT</text>
    </g>
    <!-- BLOCK 4: BOUNDARIES -->
    <g transform="translate(240, 150)">
      <rect x="0" y="0" width="220" height="130" fill="none" stroke="#c9a962" stroke-width="2" opacity="0.85"/>
      <rect x="8" y="8" width="204" height="114" fill="none" stroke="#c9a962" stroke-width="1" opacity="0.3"/>
      <text x="14" y="28" font-family="'Courier New', monospace" font-size="14" fill="#c9a962" opacity="0.7">04</text>
      <text x="110" y="78" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="600" letter-spacing="2" fill="#f5f5f7" text-anchor="middle">BOUNDARIES</text>
    </g>
  </g>

  <!-- Bottom-left meta -->
  <text x="80" y="810" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#96969a">13 ready-to-copy prompts</text>
  <text x="80" y="840" font-family="'Courier New', monospace" font-size="16" fill="#6e6e72">learn.chatgpt.com/docs/prompting</text>

  <!-- Bottom-right meta -->
  <text x="1540" y="840" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-style="italic" fill="#6e6e72" text-anchor="end">— 朱有以 · 2026/07</text>
</svg>